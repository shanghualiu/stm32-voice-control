name: Build STM32 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Download STM32F1 HAL Driver
        run: |
          cd Voice_Control_System
          mkdir -p Drivers/CMSIS
          mkdir -p Drivers/STM32F1xx_HAL_Driver/Legacy

          F1="https://raw.githubusercontent.com/STMicroelectronics/STM32CubeF1/master"

          # CMSIS Core
          for f in cmsis_compiler.h cmsis_gcc.h cmsis_version.h core_cm3.h mpu_armv7.h; do
            curl -sL "${F1}/Drivers/CMSIS/Core/Include/${f}" -o "Drivers/CMSIS/${f}"
          done

          # CMSIS Device headers
          for f in stm32f103xb.h stm32f1xx.h system_stm32f1xx.h; do
            curl -sL "${F1}/Drivers/CMSIS/Device/ST/STM32F1xx/Include/${f}" -o "Drivers/CMSIS/${f}"
          done

          # CMSIS Device sources
          curl -sL "${F1}/Drivers/CMSIS/Device/ST/STM32F1xx/Source/Templates/system_stm32f1xx.c" -o "Drivers/CMSIS/system_stm32f1xx.c"
          curl -sL "${F1}/Drivers/CMSIS/Device/ST/STM32F1xx/Source/Templates/gcc/startup_stm32f103xb.s" -o "Drivers/CMSIS/startup_stm32f103xb.s"

          # HAL headers
          HAL_INC="${F1}/Drivers/STM32F1xx_HAL_Driver/Inc"
          for f in stm32f1xx_hal.h stm32f1xx_hal_def.h stm32f1xx_hal_cortex.h stm32f1xx_hal_gpio.h stm32f1xx_hal_gpio_ex.h stm32f1xx_hal_rcc.h stm32f1xx_hal_rcc_ex.h stm32f1xx_hal_flash.h stm32f1xx_hal_flash_ex.h stm32f1xx_hal_pwr.h stm32f1xx_hal_dma.h stm32f1xx_hal_i2c.h stm32f1xx_hal_tim.h stm32f1xx_hal_tim_ex.h stm32f1xx_hal_uart.h; do
            curl -sL "${HAL_INC}/${f}" -o "Drivers/STM32F1xx_HAL_Driver/${f}"
          done
          curl -sL "${HAL_INC}/Legacy/stm32_hal_legacy.h" -o "Drivers/STM32F1xx_HAL_Driver/Legacy/stm32_hal_legacy.h"

          # HAL sources
          HAL_SRC="${F1}/Drivers/STM32F1xx_HAL_Driver/Src"
          for f in stm32f1xx_hal.c stm32f1xx_hal_cortex.c stm32f1xx_hal_gpio.c stm32f1xx_hal_rcc.c stm32f1xx_hal_flash.c stm32f1xx_hal_pwr.c stm32f1xx_hal_dma.c stm32f1xx_hal_i2c.c stm32f1xx_hal_tim.c stm32f1xx_hal_uart.c; do
            curl -sL "${HAL_SRC}/${f}" -o "Drivers/STM32F1xx_HAL_Driver/${f}"
          done

      - name: Compile firmware
        run: |
          cd Voice_Control_System
          make clean && make

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice_Control_System_Firmware
          path: |
            Voice_Control_System/build/Voice_Control_System.hex
            Voice_Control_System/build/Voice_Control_System.bin
          retention-days: 90
