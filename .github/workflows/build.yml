name: Build STM32 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Download STM32F1 HAL Driver
        run: |
          cd Voice_Control_System
          mkdir -p Drivers/CMSIS Drivers/STM32F1xx_HAL_Driver

          echo "=== Cloning CMSIS Core (ARM) ==="
          git clone --depth 1 https://github.com/ARM-software/CMSIS_5.git /tmp/cmsis5
          cp /tmp/cmsis5/CMSIS/Core/Include/*.h Drivers/CMSIS/
          rm -rf /tmp/cmsis5

          echo "=== Cloning CMSIS Device F1 ==="
          git clone --depth 1 https://github.com/STMicroelectronics/cmsis_device_f1.git /tmp/cmsis_dev
          cp /tmp/cmsis_dev/Include/*.h Drivers/CMSIS/
          cp /tmp/cmsis_dev/Source/Templates/system_stm32f1xx.c Drivers/CMSIS/
          cp /tmp/cmsis_dev/Source/Templates/gcc/startup_stm32f103xb.s Drivers/CMSIS/
          rm -rf /tmp/cmsis_dev

          echo "=== Cloning HAL Driver F1 ==="
          git clone --depth 1 https://github.com/STMicroelectronics/stm32f1xx_hal_driver.git /tmp/hal
          cp -r /tmp/hal/Inc/* Drivers/STM32F1xx_HAL_Driver/
          cp /tmp/hal/Src/*.c Drivers/STM32F1xx_HAL_Driver/
          rm -rf /tmp/hal

          echo "=== Downloaded: CMSIS=$(ls Drivers/CMSIS/*.h 2>/dev/null | wc -l) files, HAL=$(ls Drivers/STM32F1xx_HAL_Driver/*.h 2>/dev/null | wc -l) headers, $(ls Drivers/STM32F1xx_HAL_Driver/*.c 2>/dev/null | wc -l) sources ==="

      - name: Compile firmware
        run: |
          cd Voice_Control_System
          make clean && make

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice_Control_System_Firmware
          path: |
            Voice_Control_System/build/Voice_Control_System.hex
            Voice_Control_System/build/Voice_Control_System.bin
          retention-days: 90
