name: Build STM32 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Download STM32F1 HAL Driver
        run: |
          cd Voice_Control_System
          mkdir -p Drivers/CMSIS Drivers/STM32F1xx_HAL_Driver

          echo "=== Cloning CMSIS Core ==="
          git clone --depth 1 https://github.com/STMicroelectronics/cmsis_core.git /tmp/cmsis_core
          cp /tmp/cmsis_core/Core/Include/*.h Drivers/CMSIS/

          echo "=== Cloning CMSIS Device F1 ==="
          git clone --depth 1 https://github.com/STMicroelectronics/cmsis_device_f1.git /tmp/cmsis_device_f1
          cp /tmp/cmsis_device_f1/Include/*.h Drivers/CMSIS/
          cp /tmp/cmsis_device_f1/Source/Templates/system_stm32f1xx.c Drivers/CMSIS/
          cp /tmp/cmsis_device_f1/Source/Templates/gcc/startup_stm32f103xb.s Drivers/CMSIS/

          echo "=== Cloning HAL Driver F1 ==="
          git clone --depth 1 https://github.com/STMicroelectronics/stm32f1xx_hal_driver.git /tmp/hal_f1
          cp -r /tmp/hal_f1/Inc/* Drivers/STM32F1xx_HAL_Driver/
          cp /tmp/hal_f1/Src/*.c Drivers/STM32F1xx_HAL_Driver/

          echo "=== Cleanup ==="
          rm -rf /tmp/cmsis_core /tmp/cmsis_device_f1 /tmp/hal_f1

          echo "=== Files downloaded ==="
          ls Drivers/CMSIS/*.h | wc -l
          ls Drivers/STM32F1xx_HAL_Driver/*.h | wc -l
          ls Drivers/STM32F1xx_HAL_Driver/*.c | wc -l

      - name: Compile firmware
        run: |
          cd Voice_Control_System
          make clean && make

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice_Control_System_Firmware
          path: |
            Voice_Control_System/build/Voice_Control_System.hex
            Voice_Control_System/build/Voice_Control_System.bin
          retention-days: 90
